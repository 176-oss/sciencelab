<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>케미컬 가디언즈:화학마스터</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+KR:wght@400;700;900&display=swap');

        /* 사이버펑크 테마 전용 CSS */
        :root {
            --neon-cyan: #0ff;
            --neon-pink: #f0f;
            --neon-yellow: #fcee0a;
            --neon-green: #39ff14;
        }

        body {
            background-color: #050505;
            background-image:
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Noto Sans KR', sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        .font-cyber {
            font-family: 'Share Tech Mono', 'Noto Sans KR', monospace;
        }

        /* 스캔라인 효과 */
        .scanlines::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 50;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* 글리치 애니메이션 */
        @keyframes glitch {
            0% {
                transform: translate(0)
            }

            20% {
                transform: translate(-2px, 2px)
            }

            40% {
                transform: translate(-2px, -2px)
            }

            60% {
                transform: translate(2px, 2px)
            }

            80% {
                transform: translate(2px, -2px)
            }

            100% {
                transform: translate(0)
            }
        }

        .animate-glitch {
            animation: glitch 0.3s cubic-bezier(.25, .46, .45, .94) both infinite;
        }

        /* 네온 그림자 유틸리티 (가독성을 위해 블러 효과 축소) */
        .neon-text-cyan {
            text-shadow: 0 0 4px var(--neon-cyan);
        }

        .neon-text-pink {
            text-shadow: 0 0 4px var(--neon-pink);
        }

        .neon-text-green {
            text-shadow: 0 0 4px var(--neon-green);
        }

        .neon-box-cyan {
            box-shadow: 0 0 5px var(--neon-cyan), inset 0 0 3px var(--neon-cyan);
            border-color: var(--neon-cyan);
        }

        .neon-box-pink {
            box-shadow: 0 0 5px var(--neon-pink), inset 0 0 3px var(--neon-pink);
            border-color: var(--neon-pink);
        }

        /* 기존 애니메이션 유지 및 변형 */
        @keyframes float-fast {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes boss-breathe {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
                filter: hue-rotate(15deg);
            }
        }

        @keyframes projectile-right {
            0% {
                transform: translateX(-60px) scale(0.5);
                opacity: 0;
            }

            50% {
                opacity: 1;
                transform: translateX(50px) scale(1.5);
            }

            100% {
                transform: translateX(200px) scale(0.5);
                opacity: 0;
            }
        }

        @keyframes projectile-left {
            0% {
                transform: translateX(60px) scale(0.5);
                opacity: 0;
            }

            50% {
                opacity: 1;
                transform: translateX(-50px) scale(1.5);
            }

            100% {
                transform: translateX(-200px) scale(0.5);
                opacity: 0;
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-4px);
            }

            75% {
                transform: translateX(4px);
            }
        }

        .animate-float-fast {
            animation: float-fast 2s ease-in-out infinite;
        }

        .animate-boss-breathe {
            animation: boss-breathe 3s ease-in-out infinite;
        }

        .animate-projectile-right {
            animation: projectile-right 0.4s ease-out forwards;
        }

        .animate-projectile-left {
            animation: projectile-left 0.4s ease-out forwards;
        }

        .animate-shake {
            animation: shake 0.2s ease-in-out infinite;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        #root {
            width: 100%;
            max-width: 900px;
            padding: 10px;
            position: relative;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 사이버펑크 스타일 게임 데이터 ---
        const BOSSES = [
            {
                id: 1,
                name: "과학 수행평가",
                icon: "📜",
                maxHp: 100,
                attack: 10,
                proj: "⚡",
                bgClass: "from-blue-950 to-black border-blue-500",
                description: "첫 번째 관문! 시스템에 침투한 수행평가 데이터입니다.",
                animClass: "animate-float-fast"
            },
            {
                id: 2,
                name: "시험",
                icon: "🏫",
                maxHp: 200,
                attack: 20,
                proj: "📡",
                bgClass: "from-fuchsia-950 to-black border-fuchsia-500",
                description: "중간 보스! 광범위한 시험 범위 데이터를 방출하는 정기시험입니다.",
                animClass: "animate-boss-breathe neon-text-pink"
            },
            {
                id: 3,
                name: "과학쌤",
                icon: "👿",
                maxHp: 400,
                attack: 30,
                proj: "☢️",
                bgClass: "from-red-950 to-black border-red-500",
                description: "진 최종 보스! 압도적인 난이도의 악마적 연산력으로 멘탈을 파괴합니다.",
                animClass: "animate-float-fast neon-text-pink drop-shadow-[0_0_20px_rgba(255,0,0,0.8)]"
            }
        ];

        const SPELLS = [
            { id: 1, name: "물 생성 프로토콜", icon: "💦", difficulty: 1, damage: 20, effect: { type: 'heal', value: 30, desc: "체력 회복" }, parts: [{ type: 'reactant', formula: 'H₂', elements: { H: 2 } }, { type: 'reactant', formula: 'O₂', elements: { O: 2 } }, { type: 'product', formula: 'H₂O', elements: { H: 2, O: 1 } }], solution: [2, 1, 2] },
            { id: 2, name: "산화구리 악성코드", icon: "🌑", difficulty: 1, damage: 20, effect: { type: 'evasion', value: 1, desc: "회피" }, parts: [{ type: 'reactant', formula: 'Cu', elements: { Cu: 1 } }, { type: 'reactant', formula: 'O₂', elements: { O: 2 } }, { type: 'product', formula: 'CuO', elements: { Cu: 1, O: 1 } }], solution: [2, 1, 2] },
            { id: 3, name: "탄소 연소 스크립트", icon: "🪨", difficulty: 1, damage: 20, parts: [{ type: 'reactant', formula: 'C', elements: { C: 1 } }, { type: 'reactant', formula: 'O₂', elements: { O: 2 } }, { type: 'product', formula: 'CO₂', elements: { C: 1, O: 2 } }], solution: [1, 1, 1] },
            { id: 4, name: "소금물 데이터베이스", icon: "🧂", difficulty: 1, damage: 20, effect: { type: 'draw', value: 2, desc: "카드 뽑기" }, parts: [{ type: 'reactant', formula: 'Na', elements: { Na: 1 } }, { type: 'reactant', formula: 'Cl₂', elements: { Cl: 2 } }, { type: 'product', formula: 'NaCl', elements: { Na: 1, Cl: 1 } }], solution: [2, 1, 2] },
            { id: 5, name: "마그네슘 플래시뱅", icon: "✨", difficulty: 2, damage: 35, effect: { type: 'stun', value: 1, desc: "기절" }, parts: [{ type: 'reactant', formula: 'Mg', elements: { Mg: 1 } }, { type: 'reactant', formula: 'O₂', elements: { O: 2 } }, { type: 'product', formula: 'MgO', elements: { Mg: 1, O: 1 } }], solution: [2, 1, 2] },
            { id: 6, name: "과산화수소 백신", icon: "🫧", difficulty: 2, damage: 35, effect: { type: 'heal', value: 50, desc: "체력 회복" }, parts: [{ type: 'reactant', formula: 'H₂O₂', elements: { H: 2, O: 2 } }, { type: 'product', formula: 'H₂O', elements: { H: 2, O: 1 } }, { type: 'product', formula: 'O₂', elements: { O: 2 } }], solution: [2, 2, 1] },
            { id: 7, name: "암모니아 가스 유출", icon: "💨", difficulty: 2, damage: 35, parts: [{ type: 'reactant', formula: 'N₂', elements: { N: 2 } }, { type: 'reactant', formula: 'H₂', elements: { H: 2 } }, { type: 'product', formula: 'NH₃', elements: { N: 1, H: 3 } }], solution: [1, 3, 2] },
            { id: 8, name: "산화철 트로이목마", icon: "🧲", difficulty: 2, damage: 35, parts: [{ type: 'reactant', formula: 'Fe', elements: { Fe: 1 } }, { type: 'reactant', formula: 'O₂', elements: { O: 2 } }, { type: 'product', formula: 'Fe₂O₃', elements: { Fe: 2, O: 3 } }], solution: [4, 3, 2] },
            { id: 9, name: "환원 알고리즘", icon: "🔨", difficulty: 3, damage: 55, parts: [{ type: 'reactant', formula: 'CuO', elements: { Cu: 1, O: 1 } }, { type: 'reactant', formula: 'C', elements: { C: 1 } }, { type: 'product', formula: 'Cu', elements: { Cu: 1 } }, { type: 'product', formula: 'CO₂', elements: { C: 1, O: 2 } }], solution: [2, 1, 2, 1] },
            { id: 10, name: "메테인 오버플로우", icon: "💥", difficulty: 3, damage: 55, effect: { type: 'crit', value: 1, desc: "크리티컬" }, parts: [{ type: 'reactant', formula: 'CH₄', elements: { C: 1, H: 4 } }, { type: 'reactant', formula: 'O₂', elements: { O: 2 } }, { type: 'product', formula: 'CO₂', elements: { C: 1, O: 2 } }, { type: 'product', formula: 'H₂O', elements: { H: 2, O: 1 } }], solution: [1, 2, 1, 2] },
            { id: 11, name: "탄산수소나트륨 폭탄", icon: "🌋", difficulty: 3, damage: 55, parts: [{ type: 'reactant', formula: 'NaHCO₃', elements: { Na: 1, H: 1, C: 1, O: 3 } }, { type: 'product', formula: 'Na₂CO₃', elements: { Na: 2, C: 1, O: 3 } }, { type: 'product', formula: 'CO₂', elements: { C: 1, O: 2 } }, { type: 'product', formula: 'H₂O', elements: { H: 2, O: 1 } }], solution: [2, 1, 1, 1] },
            { id: 12, name: "산화알루미늄 실드", icon: "🛡️", difficulty: 3, damage: 55, effect: { type: 'shield', value: 1, desc: "방어" }, parts: [{ type: 'reactant', formula: 'Al', elements: { Al: 1 } }, { type: 'reactant', formula: 'O₂', elements: { O: 2 } }, { type: 'product', formula: 'Al₂O₃', elements: { Al: 2, O: 3 } }], solution: [4, 3, 2] },
            { id: 13, name: "염소산칼륨 분해식", icon: "🧪", difficulty: 3, damage: 55, parts: [{ type: 'reactant', formula: 'KClO₃', elements: { K: 1, Cl: 1, O: 3 } }, { type: 'product', formula: 'KCl', elements: { K: 1, Cl: 1 } }, { type: 'product', formula: 'O₂', elements: { O: 2 } }], solution: [2, 2, 3] },
            { id: 14, name: "프로페인 연쇄폭발", icon: "🔥", difficulty: 3, damage: 70, parts: [{ type: 'reactant', formula: 'C₃H₈', elements: { C: 3, H: 8 } }, { type: 'reactant', formula: 'O₂', elements: { O: 2 } }, { type: 'product', formula: 'CO₂', elements: { C: 1, O: 2 } }, { type: 'product', formula: 'H₂O', elements: { H: 2, O: 1 } }], solution: [1, 5, 3, 4] },
            { id: 15, name: "백색 앙금 멀웨어", icon: "🥛", difficulty: 3, damage: 60, parts: [{ type: 'reactant', formula: 'Na₂CO₃', elements: { Na: 2, C: 1, O: 3 } }, { type: 'reactant', formula: 'CaCl₂', elements: { Ca: 1, Cl: 2 } }, { type: 'product', formula: 'CaCO₃', elements: { Ca: 1, C: 1, O: 3 } }, { type: 'product', formula: 'NaCl', elements: { Na: 1, Cl: 1 } }], solution: [1, 1, 1, 2] },
            { id: 16, name: "질소 산화 스파크", icon: "🌩️", difficulty: 2, damage: 45, effect: { type: 'double', value: 1, desc: "데미지 2배" }, parts: [{ type: 'reactant', formula: 'N₂', elements: { N: 2 } }, { type: 'reactant', formula: 'O₂', elements: { O: 2 } }, { type: 'product', formula: 'NO₂', elements: { N: 1, O: 2 } }], solution: [1, 2, 2] },
            { id: 17, name: "수소 기체 바이러스", icon: "🧼", difficulty: 2, damage: 45, effect: { type: 'reflect', value: 1, desc: "반사" }, parts: [{ type: 'reactant', formula: 'Mg', elements: { Mg: 1 } }, { type: 'reactant', formula: 'HCl', elements: { H: 1, Cl: 1 } }, { type: 'product', formula: 'MgCl₂', elements: { Mg: 1, Cl: 2 } }, { type: 'product', formula: 'H₂', elements: { H: 2 } }], solution: [1, 2, 1, 1] },
            { id: 18, name: "질산은 블라인드", icon: "🌫️", difficulty: 1, damage: 30, parts: [{ type: 'reactant', formula: 'NaCl', elements: { Na: 1, Cl: 1 } }, { type: 'reactant', formula: 'AgNO₃', elements: { Ag: 1, N: 1, O: 3 } }, { type: 'product', formula: 'AgCl', elements: { Ag: 1, Cl: 1 } }, { type: 'product', formula: 'NaNO₃', elements: { Na: 1, N: 1, O: 3 } }], solution: [1, 1, 1, 1] },
            { id: 19, name: "이산화탄소 블래스트", icon: "🌬️", difficulty: 3, damage: 70, parts: [{ type: 'reactant', formula: 'HCl', elements: { H: 1, Cl: 1 } }, { type: 'reactant', formula: 'CaCO₃', elements: { Ca: 1, C: 1, O: 3 } }, { type: 'product', formula: 'CaCl₂', elements: { Ca: 1, Cl: 2 } }, { type: 'product', formula: 'CO₂', elements: { C: 1, O: 2 } }, { type: 'product', formula: 'H₂O', elements: { H: 2, O: 1 } }], solution: [2, 1, 1, 1, 1] }
        ];

        function AlchemistGame() {
            const PLAYER_MAX_HP = 300;

            const [gameState, setGameState] = useState('intro');
            const [currentBossIndex, setCurrentBossIndex] = useState(0);
            const [bossHp, setBossHp] = useState(BOSSES[0].maxHp);
            const [playerHp, setPlayerHp] = useState(PLAYER_MAX_HP);
            const [hand, setHand] = useState([]);
            const [selectedHandIndex, setSelectedHandIndex] = useState(null);
            const [coefficients, setCoefficients] = useState([]);
            const [practiceSpell, setPracticeSpell] = useState(null);
            const [practiceStatus, setPracticeStatus] = useState('playing');
            const [buffs, setBuffs] = useState({ shield: 0, evasion: 0, reflect: 0 });

            const [animState, setAnimState] = useState({
                player: 'idle', boss: 'idle', projectile: null, attacker: null, damageTextPlayer: null, damageTextBoss: null
            });

            const currentBoss = BOSSES[currentBossIndex];
            const selectedSpell = selectedHandIndex !== null && hand.length > selectedHandIndex ? hand[selectedHandIndex] : null;

            const getRandomSpell = () => SPELLS[Math.floor(Math.random() * SPELLS.length)];

            const startGame = () => {
                setCurrentBossIndex(0);
                setBossHp(BOSSES[0].maxHp);
                setPlayerHp(PLAYER_MAX_HP);
                setBuffs({ shield: 0, evasion: 0, reflect: 0 });
                setHand([getRandomSpell(), getRandomSpell(), getRandomSpell(), getRandomSpell(), getRandomSpell()]);
                setGameState('battle');
            };

            const startPractice = () => {
                const spell = getRandomSpell();
                setPracticeSpell(spell);
                setCoefficients(new Array(spell.parts.length).fill(1));
                setPracticeStatus('playing');
                setGameState('practice');
            };

            const nextPractice = () => {
                const spell = getRandomSpell();
                setPracticeSpell(spell);
                setCoefficients(new Array(spell.parts.length).fill(1));
                setPracticeStatus('playing');
            };

            const checkPracticeResult = () => {
                if (!practiceSpell) return;
                const isCorrect = coefficients.every((val, index) => val === practiceSpell.solution[index]);
                setPracticeStatus(isCorrect ? 'correct' : 'incorrect');
            };

            const executeBossAttack = (currentHp, currentBuffs, onComplete) => {
                let damage = currentBoss.attack;
                let pText = `-${damage}`;
                let rDamage = 0;
                let consumedBuff = null;

                if (currentBuffs.evasion > 0) {
                    damage = 0; pText = "회피!"; consumedBuff = 'evasion';
                } else if (currentBuffs.reflect > 0) {
                    rDamage = damage; damage = 0; pText = "반사!"; consumedBuff = 'reflect';
                } else if (currentBuffs.shield > 0) {
                    damage = Math.floor(damage / 2); pText = `-${damage} (방어)`; consumedBuff = 'shield';
                }

                if (consumedBuff) {
                    setBuffs(prev => ({ ...prev, [consumedBuff]: prev[consumedBuff] - 1 }));
                }

                setAnimState(prev => ({ ...prev, boss: 'attack', projectile: currentBoss.proj, attacker: 'boss' }));

                setTimeout(() => {
                    const newHp = Math.max(0, currentHp - damage);
                    setPlayerHp(newHp);

                    let newBossHpStr = null;
                    if (rDamage > 0) {
                        setBossHp(prev => Math.max(1, prev - rDamage));
                        newBossHpStr = `-${rDamage} 반사!`;
                    }

                    setAnimState(prev => ({
                        ...prev,
                        player: 'hurt',
                        boss: 'idle',
                        projectile: null,
                        damageTextPlayer: pText,
                        ...(newBossHpStr ? { damageTextBoss: newBossHpStr } : {})
                    }));

                    setTimeout(() => {
                        if (newHp === 0) {
                            setGameState('game_over');
                        } else {
                            if (onComplete) onComplete(newHp);
                        }
                    }, 1000);
                }, 400);
            };

            const drawCard = () => {
                if (hand.length >= 5) return;
                executeBossAttack(playerHp, buffs, (newHp) => {
                    setHand(prev => {
                        if (prev.length < 5) return [...prev, getRandomSpell()];
                        return prev;
                    });
                    setAnimState(prev => ({ ...prev, player: 'idle', damageTextPlayer: null, damageTextBoss: null }));
                });
            };

            const handleSpellSelect = (index) => {
                setSelectedHandIndex(index);
                setCoefficients(new Array(hand[index].parts.length).fill(1));
                setGameState('solving');
            };

            const updateCoefficient = (index, delta) => {
                const newCoeffs = [...coefficients];
                newCoeffs[index] = Math.max(1, newCoeffs[index] + delta);
                setCoefficients(newCoeffs);
                if (gameState === 'practice' && practiceStatus === 'incorrect') setPracticeStatus('playing');
            };

            const calculateAtoms = (spell) => {
                const leftAtoms = {};
                const rightAtoms = {};
                if (!spell || coefficients.length === 0) return { leftAtoms, rightAtoms };
                spell.parts.forEach((part, index) => {
                    const coeff = coefficients[index];
                    Object.entries(part.elements).forEach(([el, count]) => {
                        if (part.type === 'reactant') leftAtoms[el] = (leftAtoms[el] || 0) + (count * coeff);
                        else rightAtoms[el] = (rightAtoms[el] || 0) + (count * coeff);
                    });
                });
                return { leftAtoms, rightAtoms };
            };

            const castSpell = () => {
                if (!selectedSpell) return;
                const isCorrect = coefficients.every((v, i) => v === selectedSpell.solution[i]);
                const effect = selectedSpell.effect;

                setHand(prev => prev.filter((_, i) => i !== selectedHandIndex));
                setSelectedHandIndex(null);

                if (isCorrect) {
                    let nextBuffs = { ...buffs };
                    let skipBossAttack = false;
                    let hpHeal = 0;
                    let extraDraw = 0;

                    let finalDamage = selectedSpell.damage;
                    let isCrit = Math.random() < 0.1;

                    if (effect) {
                        if (effect.type === 'crit') isCrit = true;
                        if (effect.type === 'double') finalDamage *= 2;
                        if (effect.type === 'shield') nextBuffs.shield += 1;
                        if (effect.type === 'evasion') nextBuffs.evasion += 1;
                        if (effect.type === 'reflect') nextBuffs.reflect += 1;
                        if (effect.type === 'stun') skipBossAttack = true;
                        if (effect.type === 'heal') hpHeal = effect.value;
                        if (effect.type === 'draw') extraDraw = effect.value;
                    }

                    if (isCrit) finalDamage *= 2;

                    setBuffs(nextBuffs);

                    let newPlayerHp = playerHp;
                    if (hpHeal > 0) {
                        newPlayerHp = Math.min(PLAYER_MAX_HP, playerHp + hpHeal);
                        setPlayerHp(newPlayerHp);
                    }

                    if (extraDraw > 0) {
                        setHand(prev => {
                            let newHand = [...prev];
                            for (let i = 0; i < extraDraw; i++) {
                                if (newHand.length < 5) newHand.push(getRandomSpell());
                            }
                            return newHand;
                        });
                    }

                    setAnimState(prev => ({
                        ...prev,
                        player: 'attack',
                        projectile: selectedSpell.icon,
                        attacker: 'player',
                        damageTextPlayer: hpHeal > 0 ? `+${hpHeal} 체력 회복` : null
                    }));

                    setTimeout(() => {
                        const newBossHp = Math.max(0, bossHp - finalDamage);
                        setBossHp(newBossHp);
                        setAnimState(prev => ({
                            ...prev,
                            player: 'idle',
                            boss: 'hurt',
                            projectile: null,
                            damageTextBoss: isCrit ? `-${finalDamage} 크리티컬!🔥` : `-${finalDamage}`
                        }));

                        setTimeout(() => {
                            setAnimState(prev => ({ ...prev, damageTextPlayer: null }));
                            if (newBossHp === 0) {
                                setAnimState(prev => ({ ...prev, boss: 'dead', damageTextBoss: null }));
                                setTimeout(() => {
                                    if (currentBossIndex + 1 < BOSSES.length) {
                                        setPlayerHp(prev => Math.min(PLAYER_MAX_HP, prev + 200));
                                        setCurrentBossIndex(prev => prev + 1);
                                        setBossHp(BOSSES[currentBossIndex + 1].maxHp);
                                        setHand([getRandomSpell(), getRandomSpell(), getRandomSpell(), getRandomSpell(), getRandomSpell()]);
                                        setBuffs({ shield: 0, evasion: 0, reflect: 0 });
                                        setGameState('battle');
                                        setAnimState(prev => ({ ...prev, boss: 'idle' }));
                                    } else {
                                        setGameState('game_clear');
                                    }
                                }, 1500);
                            } else {
                                if (skipBossAttack) {
                                    setAnimState(prev => ({ ...prev, damageTextBoss: "기절!", boss: 'idle' }));
                                    setTimeout(() => {
                                        setGameState('battle');
                                        setAnimState(prev => ({ ...prev, damageTextBoss: null }));
                                    }, 800);
                                } else {
                                    executeBossAttack(newPlayerHp, nextBuffs, () => {
                                        setGameState('battle');
                                        setAnimState(prev => ({ ...prev, player: 'idle', damageTextPlayer: null, damageTextBoss: null }));
                                    });
                                }
                            }
                        }, 1000);
                    }, 400);
                } else {
                    setAnimState(prev => ({ ...prev, damageTextBoss: "SYNTAX ERROR!" }));
                    setTimeout(() => {
                        executeBossAttack(playerHp, buffs, () => {
                            setGameState('battle');
                            setAnimState(prev => ({ ...prev, player: 'idle', damageTextPlayer: null, damageTextBoss: null }));
                        });
                    }, 800);
                }
            };

            // [수정된 부분] flex-nowrap으로 한 줄을 유지하고, 폰트를 tracking-tighter 와 font-sans로 바꾸어 띄어쓰기를 없앴습니다.
            const EquationRow = ({ spell, isPractice }) => {
                return (
                    <div className="flex flex-nowrap justify-start sm:justify-center items-center gap-x-1 sm:gap-x-1.5 text-sm sm:text-lg md:text-xl font-bold bg-black p-3 sm:p-4 rounded-none border border-cyan-500/50 mb-6 neon-box-cyan w-full overflow-x-auto whitespace-nowrap scrollbar-hide">
                        {spell.parts.map((part, index) => {
                            const isFirstProduct = index > 0 && part.type === 'product' && spell.parts[index - 1].type === 'reactant';
                            const isPlus = index > 0 && !isFirstProduct;

                            return (
                                <div key={index} className="flex items-center shrink-0">
                                    {isFirstProduct && <span className="text-cyan-400 mx-1 sm:mx-2 font-bold drop-shadow-md">➔</span>}
                                    {isPlus && <span className="text-gray-500 mx-0.5 sm:mx-1">+</span>}

                                    <div className={`flex items-center bg-gray-900/90 p-0.5 sm:p-1 border ${isPractice ? 'border-green-500/50' : 'border-cyan-500/50'} transition-colors`}>
                                        <div className="flex flex-col border-r border-gray-700 pr-0.5 mr-0.5 sm:pr-1 sm:mr-1">
                                            <button onClick={() => updateCoefficient(index, 1)} disabled={isPractice && practiceStatus === 'correct'} className="text-[10px] sm:text-[12px] text-gray-400 hover:text-cyan-400 disabled:opacity-0 transition-colors">▲</button>
                                            <button onClick={() => updateCoefficient(index, -1)} disabled={isPractice && practiceStatus === 'correct'} className="text-[10px] sm:text-[12px] text-gray-400 hover:text-cyan-400 disabled:opacity-0 transition-colors">▼</button>
                                        </div>
                                        <div className="w-4 sm:w-6 text-center text-yellow-400 text-lg sm:text-xl md:text-2xl font-cyber font-bold drop-shadow-md">
                                            {coefficients[index] === 1 ? ' ' : coefficients[index]}
                                        </div>
                                        <div className="pr-1 text-green-400 font-sans tracking-tighter font-bold text-base sm:text-lg md:text-2xl flex items-center drop-shadow-md">
                                            {part.formula}
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                );
            };

            const AtomDashboard = ({ leftAtoms, rightAtoms, isPractice }) => {
                const allElements = Array.from(new Set([...Object.keys(leftAtoms), ...Object.keys(rightAtoms)]));
                return (
                    <div className="w-full flex flex-col gap-1.5 mb-6 animate-in fade-in duration-500 font-cyber">
                        <div className="grid grid-cols-2 gap-4 text-center mb-1 border-b border-gray-800 pb-1">
                            <div className="text-[10px] font-bold text-cyan-500 uppercase tracking-widest">반응물 (REACTANT)</div>
                            <div className="text-[10px] font-bold text-fuchsia-500 uppercase tracking-widest">생성물 (PRODUCT)</div>
                        </div>
                        <div className="flex flex-col gap-1.5">
                            {allElements.map(el => {
                                const lc = leftAtoms[el] || 0;
                                const rc = rightAtoms[el] || 0;
                                const isBalanced = lc === rc;
                                return (
                                    <div key={el} className="flex items-center gap-2">
                                        <div className={`flex-1 flex justify-end items-center p-1.5 sm:p-2 border-y border-l transition-all ${isBalanced ? 'bg-cyan-900/20 border-cyan-500/50' : 'bg-gray-900/50 border-gray-800'}`}>
                                            <span className={`text-xs sm:text-sm font-bold ${isBalanced ? 'text-cyan-400 drop-shadow-md' : 'text-gray-500'}`}>{lc}</span>
                                        </div>
                                        <div className={`z-10 w-8 h-8 sm:w-10 sm:h-10 flex items-center justify-center border font-black text-xs sm:text-sm shrink-0 transition-transform ${isBalanced ? 'bg-cyan-600 border-cyan-400 text-black shadow-[0_0_10px_#0ff] scale-110' : 'bg-gray-800 border-gray-600 text-gray-400'}`}>
                                            {el}
                                        </div>
                                        <div className={`flex-1 flex justify-start items-center p-1.5 sm:p-2 border-y border-r transition-all ${isBalanced ? 'bg-cyan-900/20 border-cyan-500/50' : 'bg-gray-900/50 border-gray-800'}`}>
                                            <span className={`text-xs sm:text-sm font-bold ${isBalanced ? 'text-cyan-400 drop-shadow-md' : 'text-gray-500'}`}>{rc}</span>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            if (gameState === 'intro') {
                return (
                    <div className="scanlines flex flex-col items-center justify-center min-h-[650px] bg-black/90 text-white p-6 sm:p-10 font-sans shadow-2xl border-2 border-cyan-500 overflow-hidden relative">

                        {/* 화학 실험 도구 아이콘 적용 */}
                        <div className="flex items-center gap-4 mb-4 z-10">
                            <div className="text-7xl animate-player-hover drop-shadow-[0_0_15px_rgba(0,255,255,0.6)]">⚗️</div>
                            <div className="text-5xl text-yellow-400 animate-pulse font-cyber">⚛️</div>
                            <div className="text-7xl animate-boss-menace drop-shadow-[0_0_20px_rgba(255,0,0,0.8)]">🧪</div>
                        </div>

                        <h1 className="font-cyber text-4xl sm:text-5xl font-black mb-6 text-cyan-400 text-center leading-tight z-10 animate-glitch neon-text-cyan">
                            케미컬 가디언즈<br />
                            <span className="text-fuchsia-500 neon-text-pink text-2xl sm:text-3xl">:: 화학마스터 ::</span>
                        </h1>

                        <div className="bg-black/60 p-5 border border-cyan-500 max-w-md w-full mb-8 z-10 font-cyber">
                            <h2 className="text-cyan-400 font-bold mb-3 flex items-center gap-2 text-sm sm:text-base border-b border-cyan-800 pb-2">
                    > SYS.MANUAL.READ()
                            </h2>
                            <ul className="text-xs sm:text-sm text-gray-300 space-y-3">
                                <li className="flex gap-2">
                                    <span className="text-cyan-500">></span>
                                    <span>반응 전 물질인 <b>반응물</b>과 반응 후 생성된 <b>생성물</b>의 원자 개수를 똑같이 맞추세요. (화학 반응 전후에 원자의 종류와 개수는 변하지 않습니다)</span>
                                </li>
                                <li className="flex gap-2">
                                    <span className="text-cyan-500">></span>
                                    <span>코드를 컴파일하여 메인프레임에 강력한 해킹 스크립트(9종 특수 스킬)를 전송합니다.</span>
                                </li>
                                <li className="flex gap-2 text-yellow-400">
                                    <span className="text-yellow-500">!</span>
                                    <span>10% 확률로 크리티컬이 발생하여 2배의 파괴력을 냅니다.</span>
                                </li>
                            </ul>
                        </div>

                        <div className="flex flex-col sm:flex-row gap-4 w-full sm:w-auto z-10 font-cyber">
                            <button onClick={startPractice} className="px-8 py-3 bg-transparent border-2 border-green-500 text-green-500 hover:bg-green-500 hover:text-black text-lg font-bold transition-all shadow-[0_0_10px_rgba(0,255,0,0.3)]">
                                [ 시뮬레이션 룸 ]
                            </button>
                            <button onClick={startGame} className="px-8 py-3 bg-cyan-600 hover:bg-cyan-500 text-black border-2 border-cyan-400 text-lg font-black transition-all shadow-[0_0_15px_rgba(0,255,255,0.6)]">
                                [ 시스템 접속 ]
                            </button>
                        </div>
                    </div>
                );
            }

            if (gameState === 'practice') {
                const { leftAtoms, rightAtoms } = calculateAtoms(practiceSpell);
                return (
                    <div className="scanlines max-w-4xl mx-auto min-h-[650px] bg-black/95 text-white p-4 sm:p-8 font-sans shadow-2xl border border-green-500 flex flex-col font-cyber">
                        <div className="flex justify-between items-center mb-6 border-b border-green-500/50 pb-4">
                            <h2 className="text-xl font-bold text-green-400 flex items-center gap-2 neon-text-green">
                    > 시뮬레이션 룸 가동중...
                            </h2>
                            <button onClick={() => setGameState('intro')} className="px-3 py-1 bg-gray-800 hover:bg-gray-700 rounded-none text-xs text-gray-400 border border-gray-600 transition">LOGOUT</button>
                        </div>
                        <div className="flex-1 flex flex-col items-center w-full overflow-y-auto scrollbar-hide">
                            <div className="text-center mb-6">
                                <h3 className="text-xl font-bold mb-1 text-cyan-300">
                                    <span className="mr-2">{practiceSpell.icon}</span> {practiceSpell.name}
                                </h3>
                                <p className="text-xs text-gray-500">// 반응물과 생성물의 원자 개수가 같도록 계수를 조작하세요.</p>
                            </div>
                            <EquationRow spell={practiceSpell} isPractice={true} />
                            <AtomDashboard leftAtoms={leftAtoms} rightAtoms={rightAtoms} isPractice={true} />
                            <div className="mt-auto pt-6 flex items-center justify-center w-full">
                                {practiceStatus === 'correct' ? (
                                    <div className="flex flex-col items-center animate-in fade-in zoom-in duration-300">
                                        <p className="text-lg font-bold text-green-400 mb-4 animate-pulse neon-text-green">SYS.VERIFIED: 질량 보존의 법칙 확인!</p>
                                        <button onClick={nextPractice} className="px-10 py-3 bg-green-500 hover:bg-green-400 text-black font-bold flex items-center gap-2 shadow-[0_0_15px_rgba(0,255,0,0.6)] transition">NEXT_CODE() ➔</button>
                                    </div>
                                ) : (
                                    <button onClick={checkPracticeResult} className="w-full max-w-xs py-4 bg-transparent border border-green-500 text-green-500 hover:bg-green-900 font-bold text-lg transition">컴파일 및 검증</button>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            if (gameState === 'game_over' || gameState === 'game_clear') {
                const isWin = gameState === 'game_clear';
                return (
                    <div className={`scanlines flex flex-col items-center justify-center min-h-[650px] p-8 font-cyber bg-black text-white border-2 ${isWin ? 'border-yellow-500 neon-box-cyan' : 'border-red-600'}`}>
                        {isWin ? <div className="text-8xl mb-6 animate-float-slow drop-shadow-[0_0_20px_rgba(250,204,21,0.8)]">🏆</div> : <div className="text-8xl mb-6 animate-glitch">💀</div>}
                        <h1 className={`text-4xl sm:text-5xl font-black mb-4 text-center ${isWin ? 'text-cyan-400 neon-text-cyan' : 'text-red-500 drop-shadow-[0_0_15px_rgba(255,0,0,0.8)]'}`}>
                            {isWin ? "SYSTEM HACKED!" : "CONNECTION LOST"}
                        </h1>
                        <p className="text-sm sm:text-base mb-8 text-gray-400 text-center max-w-md">
                            {isWin ? "당신은 전설적인 화학 마스터입니다!" : "F학점!! 화학 지식을 재정비하십시오."}
                        </p>
                        <button onClick={() => setGameState('intro')} className="px-8 py-3 bg-transparent border-2 border-cyan-500 text-cyan-400 hover:bg-cyan-500 hover:text-black font-bold transition shadow-[0_0_15px_rgba(0,255,255,0.5)]">
                    > RETURN TO MAIN
                        </button>
                    </div>
                );
            }

            return (
                <div className={`scanlines max-w-4xl mx-auto min-h-[650px] bg-black text-gray-100 p-4 sm:p-6 font-sans border border-cyan-900 flex flex-col relative overflow-hidden font-cyber`}>
                    {/* HUD */}
                    <div className="flex justify-between items-start mb-4 relative z-10 gap-2">
                        <div className="bg-black/80 p-2 sm:p-3 border-l-4 border-cyan-500 flex-1">
                            <div className="text-cyan-400 font-bold text-[10px] sm:text-xs mb-1 flex justify-between items-center gap-1">
                                <span>> 학생</span>
                                <div className="flex gap-1">
                                    {buffs.shield > 0 && <span className="text-[8px] bg-blue-900/60 text-blue-300 px-1 border border-blue-600">방어</span>}
                                    {buffs.evasion > 0 && <span className="text-[8px] bg-gray-700/60 text-gray-200 px-1 border border-gray-500">회피</span>}
                                    {buffs.reflect > 0 && <span className="text-[8px] bg-purple-900/60 text-purple-300 px-1 border border-purple-600">반사</span>}
                                </div>
                            </div>
                            <div className="w-full bg-gray-900 h-1.5 mb-1 overflow-hidden border border-cyan-900">
                                <div className="bg-cyan-500 h-full transition-all duration-500 shadow-[0_0_10px_rgba(0,255,255,0.8)]" style={{ width: `${(playerHp / PLAYER_MAX_HP) * 100}%` }}></div>
                            </div>
                            <div className="text-[8px] text-cyan-600 flex justify-between"><span>SYNC</span><span>{playerHp}/{PLAYER_MAX_HP}</span></div>
                        </div>

                        <div className={`bg-black/80 p-2 sm:p-3 border-r-4 ${currentBossIndex === 2 ? 'border-red-500' : 'border-fuchsia-500'} flex-1 text-right`}>
                            <div className={`font-bold text-[10px] sm:text-xs mb-1 ${currentBossIndex === 2 ? 'text-red-500' : 'text-fuchsia-400'}`}>SYS.{currentBoss.name}</div>
                            <div className="w-full bg-gray-900 h-1.5 mb-1 overflow-hidden border border-gray-800">
                                <div className={`${currentBossIndex === 2 ? 'bg-red-500 shadow-[0_0_10px_rgba(255,0,0,0.8)]' : 'bg-fuchsia-500 shadow-[0_0_10px_rgba(255,0,255,0.8)]'} h-full transition-all duration-500 float-right`} style={{ width: `${(bossHp / currentBoss.maxHp) * 100}%` }}></div>
                            </div>
                            <div className={`text-[8px] ${currentBossIndex === 2 ? 'text-red-700' : 'text-fuchsia-700'} flex justify-between`}><span>{bossHp}/{currentBoss.maxHp}</span><span>INTEGRITY</span></div>
                        </div>
                    </div>

                    {/* Battle Scene */}
                    <div className="flex justify-between items-center px-6 sm:px-12 py-4 min-h-[140px] relative z-0">
                        <div className="relative">
                            <div className={`text-6xl sm:text-7xl transition-all duration-300 ${animState.player === 'attack' ? 'translate-x-12 scale-110' : animState.player === 'hurt' ? 'animate-glitch opacity-50' : 'animate-player-hover drop-shadow-[0_0_15px_rgba(0,255,255,0.4)]'}`}>
                                🧑
                            </div>
                            {animState.damageTextPlayer && <div className={`absolute -top-6 -right-6 text-xl font-black ${animState.damageTextPlayer.includes('회복') ? 'text-cyan-400' : 'text-red-500'} animate-bounce whitespace-nowrap drop-shadow-md`}>{animState.damageTextPlayer}</div>}
                        </div>

                        <div className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 z-20 pointer-events-none">
                            {animState.projectile && (
                                <div className={`text-5xl animate-in fade-in duration-200 drop-shadow-[0_0_15px_rgba(255,255,255,0.8)] ${animState.attacker === 'player' ? 'animate-projectile-right' : 'animate-projectile-left'}`}>
                                    {animState.projectile}
                                </div>
                            )}
                        </div>

                        <div className="relative">
                            <div className={`text-6xl sm:text-7xl transition-all duration-300 ${animState.boss === 'hurt' ? 'scale-90 opacity-50 animate-glitch' : animState.boss === 'attack' ? '-translate-x-12 scale-110' : animState.boss === 'dead' ? 'opacity-0 scale-50 rotate-90' : currentBoss.animClass}`}>
                                {currentBoss.icon}
                            </div>
                            {animState.damageTextBoss && (
                                <div className={`absolute -top-6 -left-6 font-black ${animState.damageTextBoss.includes('ERROR') ? 'text-gray-500 text-xl' : animState.damageTextBoss.includes('크리티컬') ? 'text-red-500 text-2xl sm:text-3xl drop-shadow-[0_0_15px_rgba(255,0,0,0.9)]' : 'text-yellow-400 text-xl drop-shadow-md'} animate-bounce whitespace-nowrap`}>
                                    {animState.damageTextBoss}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Interface Area */}
                    <div className="flex-1 flex flex-col mt-2 z-10 bg-black/90 border border-cyan-900 p-4 sm:p-5 shadow-[0_-10px_40px_rgba(0,255,255,0.1)] backdrop-blur-md overflow-y-auto scrollbar-hide">
                        {gameState === 'battle' ? (
                            <div className="flex flex-col h-full animate-in slide-in-from-bottom-4">
                                <div className="flex justify-between items-center mb-3 border-b border-gray-800 pb-2">
                                    <h3 className="text-xs font-bold text-cyan-400 flex items-center gap-1">> 사용 가능한 카드 ({hand.length}/5)</h3>
                                    <button onClick={drawCard} disabled={hand.length >= 5 || animState.player !== 'idle'} className="px-3 py-1 bg-transparent border border-cyan-600 hover:bg-cyan-900 disabled:border-gray-800 disabled:text-gray-600 text-cyan-400 text-[9px] font-bold transition flex items-center gap-1">카드 뽑기</button>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 pb-2">
                                    {hand.map((spell, i) => (
                                        <button key={i} onClick={() => handleSpellSelect(i)} className="bg-gray-900/50 border border-gray-700 hover:border-cyan-500 p-2 flex justify-between items-center transition group text-left hover:shadow-[0_0_10px_rgba(0,255,255,0.2)]">
                                            <div className="flex flex-col items-start gap-1">
                                                <div className="flex items-center gap-2">
                                                    <span className="text-lg group-hover:scale-110 transition-transform grayscale group-hover:grayscale-0">{spell.icon}</span>
                                                    <span className="font-bold text-xs text-gray-300 group-hover:text-white">{spell.name}</span>
                                                </div>
                                                {spell.effect && (
                                                    <span className="text-[9px] text-yellow-400/80 bg-yellow-900/20 px-1 rounded border border-yellow-700/30">
                                // {spell.effect.desc}
                                                    </span>
                                                )}
                                            </div>
                                            <span className="text-cyan-400 font-black text-[9px] px-2 py-0.5 bg-cyan-950/30 border border-cyan-900/50 flex-shrink-0">{spell.damage} DMG</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        ) : selectedSpell && (
                            <div className="flex flex-col h-full justify-between animate-in zoom-in-95 duration-200">
                                <div className="flex justify-between items-center mb-3 border-b border-gray-800 pb-2">
                                    <div className="flex items-center gap-2">
                                        <span className="text-lg grayscale-0">{selectedSpell.icon}</span>
                                        <h3 className="text-xs font-bold text-cyan-400">> COMPILING_SCRIPT...</h3>
                                    </div>
                                    <button onClick={() => setGameState('battle')} className="text-[9px] text-gray-500 hover:text-red-400 transition">[ ESC ]</button>
                                </div>
                                <EquationRow spell={selectedSpell} isPractice={false} />
                                <AtomDashboard leftAtoms={calculateAtoms(selectedSpell).leftAtoms} rightAtoms={calculateAtoms(selectedSpell).rightAtoms} isPractice={false} />
                                <button onClick={castSpell} className="w-full py-4 bg-cyan-600 hover:bg-cyan-500 text-black border-2 border-cyan-400 font-black text-base shadow-[0_0_15px_rgba(0,255,255,0.4)] active:scale-95 transition flex items-center justify-center gap-2 mt-auto">
                                    ▶ RUN: 코드 실행
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AlchemistGame />);
    </script>
</body>

</html>
