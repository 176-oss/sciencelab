<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>일정 성분비 법칙 게임 시뮬레이터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0f172a; color: #f8fafc; touch-action: manipulation; }
        canvas { max-width: 100%; height: auto !important; }
        
        /* 탭 버튼 스타일 */
        .tab-btn { transition: all 0.2s ease; border-bottom: 3px solid transparent; }
        .tab-btn.active { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: bold; background-color: rgba(59, 130, 246, 0.1); }
        
        .particle-cu { color: #f59e0b; font-weight: bold; }
        .particle-o { color: #ef4444; font-weight: bold; }
        .particle-cuo { color: #94a3b8; font-weight: bold; }
        
        /* 불꽃 애니메이션 */
        .flame {
            width: 40px; height: 40px;
            background: radial-gradient(circle, #fbbf24 0%, #ea580c 60%, transparent 100%);
            border-radius: 50% 50% 20% 20%; position: absolute;
            bottom: 35%; left: 50%; transform: translateX(-50%);
            animation: flicker 0.1s infinite alternate; opacity: 0; pointer-events: none;
        }
        .heating .flame { opacity: 1; }
        @keyframes flicker { 0% { transform: translateX(-50%) scale(1); } 100% { transform: translateX(-50%) scale(1.1) translateY(-2px); } }
        
        #lab-container { position: relative; background-color: #1e293b; border-radius: 1rem; overflow: hidden; aspect-ratio: 16 / 10; border: 2px solid #334155; }

        input[type=range] { height: 32px; -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; background: #334155; border-radius: 4px; }
        input[type=range]::-webkit-slider-thumb { height: 24px; width: 24px; border-radius: 50%; background: #3b82f6; -webkit-appearance: none; margin-top: -8px; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); cursor: pointer; }
        input[type=range]:disabled::-webkit-slider-thumb { background: #64748b; cursor: not-allowed; }
    </style>
</head>
<body class="p-2 md:p-4 min-h-screen flex flex-col">

    <div class="max-w-6xl mx-auto w-full space-y-4 flex-grow">
        <div class="bg-slate-800 rounded-2xl overflow-hidden shadow-2xl border border-slate-700">
            <div class="p-4 md:p-6 text-center bg-gradient-to-r from-blue-900 to-indigo-900">
                <h1 class="text-2xl md:text-3xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-teal-300">🎮 일정 성분비 법칙 챌린지</h1>
                <p class="text-sm text-blue-200 opacity-90">게임을 통해 구리와 산소의 반응 비율(4:1)을 마스터하세요!</p>
            </div>
            <div class="flex text-sm md:text-base border-t border-slate-700 bg-slate-900">
                <button class="flex-1 py-3 tab-btn active" onclick="changeMode('free')">🧪 자유 실험</button>
                <button class="flex-1 py-3 tab-btn" onclick="changeMode('zero')">🎯 미션1: 제로 웨이스트</button>
                <button class="flex-1 py-3 tab-btn" onclick="changeMode('survival')">⏱️ 미션2: 산소 서바이벌</button>
                <button class="flex-1 py-3 tab-btn" onclick="changeMode('blind')">🕵️ 미션3: 블라인드 추리</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-4">
            
            <div class="lg:col-span-7 space-y-4">
                
                <div id="missionBox" class="bg-blue-900/50 border border-blue-500/50 p-4 rounded-xl hidden text-center">
                    <h2 class="font-bold text-blue-300 mb-1">현재 미션</h2>
                    <p id="missionText" class="text-lg font-black text-white">미션 내용이 표시됩니다.</p>
                </div>

                <div id="lab-container" class="shadow-2xl">
                    <canvas id="simCanvas"></canvas>
                    <div class="flame" id="burnerFlame"></div>
                    <div id="blindCurtain" class="absolute inset-0 bg-slate-900/90 flex flex-col items-center justify-center hidden z-10">
                        <span class="text-6xl mb-4">❓</span>
                        <p class="text-xl font-bold text-slate-300">물질이 가려져 있습니다.</p>
                        <p class="text-sm text-slate-500 mt-2">가열하여 결과를 확인하세요!</p>
                    </div>
                </div>

                <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700 shadow-xl">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div id="cuControl">
                            <div class="flex justify-between items-end mb-2">
                                <span class="text-sm font-bold particle-cu">구리 가루 (Cu)</span>
                                <span class="text-lg font-black text-amber-500"><span id="cuVal">8</span>g</span>
                            </div>
                            <input type="range" id="cuSlider" min="0" max="20" step="4" value="8">
                        </div>
                        <div id="oControl">
                            <div class="flex justify-between items-end mb-2">
                                <span class="text-sm font-bold particle-o">공기 중 산소 (O₂)</span>
                                <span class="text-lg font-black text-red-500"><span id="oVal">3</span>g</span>
                            </div>
                            <input type="range" id="oSlider" min="0" max="8" step="1" value="3">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mt-6">
                        <button id="heatBtn" class="bg-gradient-to-r from-red-600 to-orange-600 hover:from-red-500 hover:to-orange-500 text-white font-bold py-3 rounded-xl transition-all shadow-lg text-lg transform active:scale-95">🔥 가열하기</button>
                        <button id="resetBtn" class="bg-slate-600 hover:bg-slate-500 text-white font-bold py-3 rounded-xl transition-all shadow-md transform active:scale-95">초기화 / 다음 문제</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-5 flex flex-col gap-4">
                
                <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700 flex-grow flex flex-col relative overflow-hidden">
                    <h3 class="font-bold text-blue-400 mb-3 flex items-center gap-2">
                        <span>📊</span> 반응 결과 보고서
                    </h3>
                    
                    <div id="resultText" class="flex-grow flex flex-col justify-center text-slate-300">
                        <p class="text-center py-8 text-slate-500 border-2 border-dashed border-slate-600 rounded-xl">실험을 진행하면<br>결과가 나타납니다.</p>
                    </div>

                    <div id="blindInputBox" class="hidden mt-4 bg-slate-900 p-4 rounded-xl border border-blue-500/30">
                        <p class="text-center text-sm text-blue-300 font-bold mb-3">결과를 보고 처음 질량을 추리하세요!</p>
                        <div class="flex gap-2 mb-3">
                            <input type="number" id="guessCu" placeholder="구리 질량(g)" class="w-1/2 bg-slate-800 border border-slate-600 rounded p-2 text-center text-white">
                            <input type="number" id="guessO" placeholder="산소 질량(g)" class="w-1/2 bg-slate-800 border border-slate-600 rounded p-2 text-center text-white">
                        </div>
                        <button id="guessBtn" class="w-full bg-blue-600 hover:bg-blue-500 font-bold py-2 rounded text-white transition">정답 제출</button>
                    </div>

                    <button id="recordBtn" class="mt-4 w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl hidden transition-colors shadow-lg">
                        그래프에 기록하기
                    </button>
                </div>

                <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 shadow-xl">
                    <h4 class="text-sm font-bold text-center text-slate-400 mb-2">실험 데이터 그래프 (구리 : 산소)</h4>
                    <div class="h-48 md:h-56">
                        <canvas id="graphCanvas"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    // --- 기본 상수 및 변수 ---
    const CU_MASS_PER_PARTICLE = 4;
    const O_MASS_PER_PARTICLE = 1;
    let cuMass = 8, oMass = 3;
    let state = 'ready'; // ready, heating, done
    let particles = [];
    
    // --- 게임 모드 상태 관리 ---
    let gameMode = 'free'; // 'free', 'zero', 'survival', 'blind'
    let currentMissionTarget = 0;
    let reactedCuMass = 0, reactedOMass = 0, producedCuOMass = 0;

    // --- 그래픽 클래스 (입자) ---
    class Particle {
        constructor(type, x, y) {
            this.type = type; this.x = x; this.y = y; this.targetX = x; this.targetY = y; this.isReacted = false;
            const baseSize = window.innerWidth < 768 ? 14 : 18;
            if (type === 'Cu') { this.color = '#f59e0b'; this.radius = baseSize; }
            else if (type === 'O') { this.color = '#ef4444'; this.radius = baseSize * 0.7; }
            else if (type === 'CuO') { this.color = '#64748b'; this.radius = baseSize * 1.1; }
        }
        draw(ctx) {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color; ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 2; ctx.stroke();
            ctx.fillStyle = '#fff'; ctx.font = `bold ${this.radius * 0.6}px Arial`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(this.type, this.x, this.y);
        }
        update() {
            if (state === 'heating') { this.x += (this.targetX - this.x) * 0.08; this.y += (this.targetY - this.y) * 0.08; }
            if (state === 'ready' && this.type === 'O') { this.x += Math.sin(Date.now() * 0.002 + this.targetY) * 0.4; this.y += Math.cos(Date.now() * 0.003 + this.targetX) * 0.4; }
        }
    }

    // --- 캔버스 렌더링 로직 ---
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    const labContainer = document.getElementById('lab-container');

    function resizeCanvas() {
        const rect = labContainer.getBoundingClientRect();
        canvas.width = rect.width; canvas.height = rect.height;
        initParticles();
    }

    function initParticles() {
        particles = [];
        const cuCount = cuMass / CU_MASS_PER_PARTICLE;
        const oCount = oMass / O_MASS_PER_PARTICLE;
        const centerX = canvas.width / 2; const centerY = canvas.height;

        for (let i = 0; i < cuCount; i++) {
            let px = centerX + (i - (cuCount - 1) / 2) * (canvas.width * 0.08);
            let py = centerY * 0.5 + (i % 2 === 0 ? 0 : 20);
            particles.push(new Particle('Cu', px, py));
        }
        for (let i = 0; i < oCount; i++) {
            let px = 50 + Math.random() * (canvas.width - 100);
            let py = 30 + Math.random() * (centerY * 0.25); 
            particles.push(new Particle('O', px, py));
        }
    }

    function drawLab() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const w = canvas.width, h = canvas.height;

        // 배경색
        ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, w, h);
        
        // 실험대
        ctx.fillStyle = '#1e293b'; ctx.fillRect(0, h * 0.85, w, h * 0.15);
        ctx.fillStyle = '#334155'; ctx.fillRect(0, h * 0.85, w, 5);

        // 램프
        ctx.fillStyle = 'rgba(56, 189, 248, 0.3)'; ctx.beginPath();
        ctx.moveTo(w*0.42, h*0.85); ctx.lineTo(w*0.58, h*0.85); ctx.lineTo(w*0.55, h*0.7); ctx.lineTo(w*0.45, h*0.7);
        ctx.closePath(); ctx.fill();

        // 삼발이
        ctx.strokeStyle = '#475569'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.ellipse(w*0.5, h*0.6, w*0.15, h*0.04, 0, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(w*0.5, h*0.85); ctx.lineTo(w*0.5, h*0.6); ctx.stroke();
        
        // 도가니
        ctx.fillStyle = '#cbd5e1'; ctx.beginPath();
        ctx.moveTo(w*0.35, h*0.45); ctx.bezierCurveTo(w*0.35, h*0.65, w*0.65, h*0.65, w*0.65, h*0.45);
        ctx.closePath(); ctx.fill(); 
        ctx.beginPath(); ctx.ellipse(w*0.5, h*0.45, w*0.15, h*0.05, 0, 0, Math.PI*2);
        ctx.fillStyle = '#94a3b8'; ctx.fill();

        // 파티클은 블라인드 모드의 대기 상태가 아닐 때만 그림
        if (!(gameMode === 'blind' && state === 'ready')) {
            particles.forEach(p => { p.update(); p.draw(ctx); });
        }
        
        requestAnimationFrame(drawLab);
    }

    // --- 게임 모드 제어 로직 ---
    function changeMode(mode) {
        gameMode = mode;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');
        
        const missionBox = document.getElementById('missionBox');
        const missionText = document.getElementById('missionText');
        const oSlider = document.getElementById('oSlider');
        const cuSlider = document.getElementById('cuSlider');
        const curtain = document.getElementById('blindCurtain');

        // UI 기본화
        cuSlider.disabled = false; oSlider.disabled = false;
        document.getElementById('cuVal').innerText = cuSlider.value;
        document.getElementById('oVal').innerText = oSlider.value;
        curtain.classList.add('hidden');
        document.getElementById('blindInputBox').classList.add('hidden');
        document.getElementById('recordBtn').classList.add('hidden');

        if (mode === 'free') {
            missionBox.classList.add('hidden');
            cuMass = parseInt(cuSlider.value); oMass = parseInt(oSlider.value);
        } else if (mode === 'zero') {
            missionBox.classList.remove('hidden');
            // 목표물량 5, 10, 15, 20, 25 중 랜덤
            currentMissionTarget = (Math.floor(Math.random() * 5) + 1) * 5; 
            missionText.innerHTML = `🎯 남는 물질 없이 <span class="text-yellow-300">산화 구리 ${currentMissionTarget}g</span>을 만드세요!`;
            cuMass = parseInt(cuSlider.value); oMass = parseInt(oSlider.value);
        } else if (mode === 'survival') {
            missionBox.classList.remove('hidden');
            // 산소량 1, 2, 3, 4, 5 중 랜덤 고정
            currentMissionTarget = Math.floor(Math.random() * 5) + 1;
            missionText.innerHTML = `⏱️ 산소가 <span class="text-red-400">딱 ${currentMissionTarget}g</span> 있습니다.<br>낭비 없이 최대의 산화 구리를 만드세요!`;
            oSlider.value = currentMissionTarget; oSlider.disabled = true;
            document.getElementById('oVal').innerText = currentMissionTarget;
            cuMass = parseInt(cuSlider.value); oMass = currentMissionTarget;
        } else if (mode === 'blind') {
            missionBox.classList.remove('hidden');
            missionText.innerHTML = `🕵️ 반응 후 결과를 보고 <span class="text-amber-400">처음 물질의 질량</span>을 추리하세요!`;
            cuSlider.disabled = true; oSlider.disabled = true;
            document.getElementById('cuVal').innerText = "?";
            document.getElementById('oVal').innerText = "?";
            curtain.classList.remove('hidden');
            
            // 랜덤으로 정답 생성 (내부적으로만 저장)
            cuMass = (Math.floor(Math.random() * 5) + 1) * 4; // 4, 8, 12, 16, 20
            oMass = Math.floor(Math.random() * 5) + 1; // 1, 2, 3, 4, 5
        }

        resetSimulationState();
    }

    function resetSimulationState() {
        state = 'ready';
        labContainer.classList.remove('heating');
        document.getElementById('resultText').innerHTML = '<p class="text-center py-8 text-slate-500 border-2 border-dashed border-slate-600 rounded-xl">가열 버튼을 눌러주세요.</p>';
        document.getElementById('recordBtn').classList.add('hidden');
        document.getElementById('blindInputBox').classList.add('hidden');
        if(gameMode === 'blind') document.getElementById('blindCurtain').classList.remove('hidden');
        
        initParticles();
    }

    // --- 핵심 반응 로직 ---
    function startReaction() {
        if (state !== 'ready') return;
        state = 'heating';
        labContainer.classList.add('heating');
        if(gameMode === 'blind') document.getElementById('blindCurtain').classList.add('hidden');

        const reactingPairs = Math.min(cuMass / CU_MASS_PER_PARTICLE, oMass / O_MASS_PER_PARTICLE); 
        reactedCuMass = reactingPairs * CU_MASS_PER_PARTICLE;
        reactedOMass = reactingPairs * O_MASS_PER_PARTICLE;
        producedCuOMass = reactedCuMass + reactedOMass;

        let cCount = 0, oCount = 0;
        particles.forEach(p => { if (p.type === 'Cu' && cCount < reactingPairs) { p.isReacted = true; cCount++; }});
        particles.forEach(p => {
            if (p.type === 'O' && oCount < reactingPairs) {
                p.isReacted = true;
                const target = particles.filter(cp => cp.type === 'Cu' && cp.isReacted)[oCount];
                p.targetX = target.x + 8; p.targetY = target.y - 4;
                oCount++;
            }
        });

        setTimeout(() => {
            state = 'done';
            labContainer.classList.remove('heating');
            let nextP = [];
            particles.forEach(p => {
                if (p.type === 'Cu' && p.isReacted) nextP.push(new Particle('CuO', p.x, p.y));
                else if (!p.isReacted) nextP.push(p);
            });
            particles = nextP;
            
            showResult();
            checkGameMissions(); // 게임 성공 여부 판별
        }, 2000);
    }

    function showResult() {
        const leftCu = cuMass - reactedCuMass;
        const leftO = oMass - reactedOMass;
        
        let resultHtml = `
            <div class="space-y-3 bg-slate-900 p-4 rounded-xl">
                <div class="flex justify-between items-center border-b border-slate-700 pb-2">
                    <span class="text-slate-300">산화 구리 생성량</span>
                    <span class="text-xl font-bold text-white">${producedCuOMass}g</span>
                </div>
                <div class="text-sm">
                    <span class="text-slate-400">남은 물질:</span>
                    <span class="font-bold ml-1">
                        ${leftCu > 0 ? `<span class="text-amber-400">구리 ${leftCu}g</span>` : ''}
                        ${leftO > 0 ? `<span class="text-red-400">산소 ${leftO}g</span>` : ''}
                        ${leftCu === 0 && leftO === 0 ? '<span class="text-green-400">없음 (완벽!)</span>' : ''}
                    </span>
                </div>
            </div>
        `;
        document.getElementById('resultText').innerHTML = resultHtml;
        
        if(gameMode !== 'blind') {
            document.getElementById('recordBtn').classList.remove('hidden');
        }
    }

    // --- 게임 판별 로직 ---
    function checkGameMissions() {
        const leftCu = cuMass - reactedCuMass;
        const leftO = oMass - reactedOMass;
        const resultDiv = document.getElementById('resultText');

        if (gameMode === 'zero') {
            if (producedCuOMass === currentMissionTarget && leftCu === 0 && leftO === 0) {
                resultDiv.innerHTML += `<div class="mt-3 p-2 bg-green-500/20 border border-green-500 text-green-300 text-center font-bold rounded animate-pulse">🎉 미션 성공! 완벽한 비율입니다!</div>`;
            } else {
                resultDiv.innerHTML += `<div class="mt-3 p-2 bg-red-500/20 border border-red-500 text-red-300 text-center font-bold rounded">😢 실패! 목표량을 확인하고 낭비를 줄이세요.</div>`;
            }
        } 
        else if (gameMode === 'survival') {
            if (leftO === 0 && leftCu === 0 && producedCuOMass > 0) {
                resultDiv.innerHTML += `<div class="mt-3 p-2 bg-green-500/20 border border-green-500 text-green-300 text-center font-bold rounded animate-pulse">🎉 미션 성공! 산소를 모두 사용했습니다.</div>`;
            } else {
                resultDiv.innerHTML += `<div class="mt-3 p-2 bg-red-500/20 border border-red-500 text-red-300 text-center font-bold rounded">😢 실패! 구리 양을 다시 조절해 보세요.</div>`;
            }
        }
        else if (gameMode === 'blind') {
            document.getElementById('blindInputBox').classList.remove('hidden');
        }
    }

    // 블라인드 모드 정답 제출 처리
    document.getElementById('guessBtn').addEventListener('click', () => {
        const gCu = parseInt(document.getElementById('guessCu').value);
        const gO = parseInt(document.getElementById('guessO').value);
        const resultDiv = document.getElementById('resultText');
        
        if (gCu === cuMass && gO === oMass) {
            alert("🎉 정답입니다! 훌륭한 추리력입니다!");
            document.getElementById('cuVal').innerText = cuMass;
            document.getElementById('oVal').innerText = oMass;
            document.getElementById('blindInputBox').classList.add('hidden');
            document.getElementById('recordBtn').classList.remove('hidden'); // 성공해야 그래프 기록 가능
        } else {
            alert("❌ 틀렸습니다. 남은 물질과 생성된 물질의 비율(4:1)을 다시 생각해 보세요!");
        }
    });


    // --- 그래프 설정 ---
    Chart.defaults.color = '#94a3b8';
    const scatterChart = new Chart(document.getElementById('graphCanvas').getContext('2d'), {
        type: 'scatter',
        data: { datasets: [{ label: '실험 성공 기록', data: [], backgroundColor: '#3b82f6', borderColor: '#3b82f6', showLine: true, pointRadius: 5 }] },
        options: {
            maintainAspectRatio: false,
            scales: {
                x: { title: { display: true, text: '반응한 구리 (g)' }, min: 0, max: 20, ticks: { stepSize: 4 }, grid: { color: '#334155' } },
                y: { title: { display: true, text: '반응한 산소 (g)' }, min: 0, max: 5, ticks: { stepSize: 1 }, grid: { color: '#334155' } }
            },
            plugins: { legend: { display: false } }
        }
    });

    // --- 이벤트 리스너 ---
    document.getElementById('cuSlider').addEventListener('input', (e) => {
        cuMass = parseInt(e.target.value); document.getElementById('cuVal').innerText = cuMass;
        if(state === 'done') resetSimulationState(); else initParticles();
    });
    document.getElementById('oSlider').addEventListener('input', (e) => {
        oMass = parseInt(e.target.value); document.getElementById('oVal').innerText = oMass;
        if(state === 'done') resetSimulationState(); else initParticles();
    });
    
    document.getElementById('heatBtn').addEventListener('click', startReaction);
    
    document.getElementById('resetBtn').addEventListener('click', () => {
        // 게임 모드일 경우 새로운 미션 부여
        changeMode(gameMode);
    });

    document.getElementById('recordBtn').addEventListener('click', () => {
        if(reactedCuMass === 0 && reactedOMass === 0) return;
        const exists = scatterChart.data.datasets[0].data.some(d => d.x === reactedCuMass && d.y === reactedOMass);
        if(!exists) {
            scatterChart.data.datasets[0].data.push({ x: reactedCuMass, y: reactedOMass });
            scatterChart.data.datasets[0].data.sort((a,b) => a.x - b.x);
            scatterChart.update();
        }
        document.getElementById('recordBtn').classList.add('hidden');
    });

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    drawLab();
</script>
</body>
</html>
